<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>TTS Audio Manager Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 40px auto; background-color: #eef2f7; color: #333; }
        .section { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
        h2, h3 { color: #2c3e50; margin-top: 0; }
        textarea { width: 100%; height: 80px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { cursor: pointer; border: none; border-radius: 6px; padding: 8px 15px; transition: 0.3s; }
        .btn-generate { background: #27ae60; color: white; width: 100%; margin-top: 10px; font-size: 18px; }
        .btn-save { background: #2980b9; color: white; }
        .btn-rename { background: #f39c12; color: white; }
        .btn-delete { background: #c0392b; color: white; }
        .btn-upload { background: #8e44ad; color: white; padding: 10px 20px; font-weight: bold;}
        button:hover { opacity: 0.8; }
        
        .item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #f0f0f0; gap: 10px; }
        .item:last-child { border-bottom: none; }
        .controls { display: flex; align-items: center; gap: 8px; }
        audio { height: 35px; }
        .rename-form { display: inline-flex; gap: 5px; }
        .rename-input { padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
        .info { font-size: 13px; color: #7f8c8d; flex-grow: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* Stili per l'area di caricamento */
        .upload-area { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px dashed #ccc; display: flex; align-items: center; justify-content: space-between;}
        input[type="file"] { font-size: 15px; }
    </style>
</head>
<body>

    <div class="section">
        <h2>Generatore Audio</h2>
        <form action="/generate" method="post">
            <textarea name="text" placeholder="Cosa devo dire?" required></textarea>
            <button type="submit" class="btn-generate">Genera ed invia</button>
        </form>
    </div>

    <div class="section">
        <h3>Ultimi Download</h3>
        {% for file in downloads %}
        <div class="item">
            <span class="info">{{ file.name }}</span>
            <div class="controls">
                <audio controls src="{{ url_for('serve_file', folder='downloads', filename=file.name) }}"></audio>
                <form action="{{ url_for('save_file', filename=file.name) }}" method="post">
                    <button type="submit" class="btn-save">Salva →</button>
                </form>
            </div>
        </div>
        {% endfor %}
    </div>

    <div class="section">
        <h3>Archivio Salvati</h3>
        
        <!-- Nuova sezione di Upload -->
        <div class="upload-area">
            <span><strong>Carica dal tuo PC:</strong></span>
            <!-- enctype="multipart/form-data" è essenziale per il caricamento file -->
            <form action="/upload" method="post" enctype="multipart/form-data" style="display: flex; gap: 10px;">
                <input type="file" name="audio_file" accept="audio/*" required>
                <button type="submit" class="btn-upload">Carica nel Server</button>
            </form>
        </div>

        {% for file in saved_files %}
        <div class="item">
            <div style="flex-grow: 1;">
                <form class="rename-form" action="{{ url_for('rename_saved', old_name=file.name) }}" method="post">
                    <input type="text" name="new_name" class="rename-input" value="{{ file.name }}">
                    <button type="submit" class="btn-rename">Rinomina</button>
                </form>
            </div>
            <div class="controls">
                <audio controls src="{{ url_for('serve_file', folder='saved', filename=file.name) }}"></audio>
                <a href="{{ url_for('delete_saved', filename=file.name) }}" class="btn-delete" style="text-decoration: none; padding: 6px 12px; font-size: 13px;">Elimina</a>
            </div>
        </div>
        {% endfor %}
    </div>

</body>
</html>
